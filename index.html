    <style>
        :root {
            /* Core Colors */
            --bg-base: #fcfbf9;
            --bg-surface: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #4b5563; /* Darkened slightly for better readability */
            --border-light: #e5e7eb;
            
            /* Shadows & Transitions */
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-hover: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, .serif { font-family: 'Fraunces', serif; }

        /* Top Progress Bar */
        #progress-bar {
            position: fixed; top: 0; left: 0; height: 4px;
            background: linear-gradient(90deg, #115e59, #b45309, #5b21b6, #1d4ed8, #9d174d);
            width: 0%; z-index: 1000; transition: width 0.1s;
        }

        /* Glassmorphic Navigation */
        nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-light);
            padding: 0 2rem; display: flex; align-items: center;
            overflow-x: auto; scrollbar-width: none; box-shadow: var(--shadow-sm);
        }
        nav::-webkit-scrollbar { display: none; }

        .nav-brand {
            font-family: 'Fraunces', serif; font-weight: 800; font-size: 1.25rem;
            padding: 1rem 1.5rem 1rem 0; margin-right: 1rem;
            border-right: 1px solid var(--border-light); white-space: nowrap;
            display: flex; align-items: center; gap: 0.5rem;
        }

        nav a {
            text-decoration: none; color: var(--text-muted);
            font-size: 0.875rem; font-weight: 600; padding: 1.25rem 1rem;
            white-space: nowrap; transition: var(--transition);
            border-bottom: 2px solid transparent;
        }
        nav a:hover, nav a.active { color: var(--text-main); border-bottom-color: var(--text-main); }

        /* Hero Section */
        .hero {
            padding: 8rem 2rem 6rem; text-align: center;
            background: radial-gradient(circle at top right, #fefce8, transparent),
                        radial-gradient(circle at top left, #f3f4f6, transparent);
            border-bottom: 1px solid var(--border-light); position: relative;
        }

        .badge-pill {
            display: inline-flex; align-items: center; gap: 0.5rem;
            background: var(--bg-surface); border: 1px solid var(--border-light);
            padding: 0.5rem 1rem; border-radius: 9999px;
            font-size: 0.875rem; font-weight: 600; color: var(--text-muted);
            margin-bottom: 2rem; box-shadow: var(--shadow-sm);
        }

        .hero h1 {
            font-size: clamp(3rem, 8vw, 5rem); line-height: 1.1;
            font-weight: 800; letter-spacing: -0.03em;
            margin-bottom: 1.5rem; color: var(--text-main);
        }

        .hero h1 span {
            font-style: italic; background: linear-gradient(120deg, #b45309, #115e59);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.125rem; color: var(--text-muted);
            max-width: 700px; margin: 0 auto 3rem;
        }

        /* Container & Section Styles */
        .container { max-width: 1100px; margin: 0 auto; padding: 4rem 1.5rem; }
        section {
            margin-bottom: 6rem; opacity: 0; transform: translateY(20px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }
        section.visible { opacity: 1; transform: translateY(0); }

        /* Pos Header */
        .pos-header { display: flex; align-items: flex-start; gap: 1.5rem; margin-bottom: 2.5rem; }
        .pos-number {
            font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 600;
            width: 60px; height: 60px; display: flex; align-items: center;
            justify-content: center; border-radius: 16px; flex-shrink: 0;
            box-shadow: var(--shadow-sm);
        }
        .pos-title-wrap h2 { font-size: 2.5rem; line-height: 1.2; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
        .pos-subtitle { font-size: 1.125rem; color: var(--text-muted); max-width: 600px; }

        /* Definitions & Examples */
        .def-card {
            background: var(--bg-surface); border: 1px solid var(--border-light);
            border-left: 6px solid; padding: 2rem; border-radius: 12px;
            margin-bottom: 1.5rem; box-shadow: var(--shadow-sm);
        }
        .def-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; margin-bottom: 0.75rem; }
        .def-text { font-size: 1.25rem; font-family: 'Fraunces', serif; line-height: 1.5; color: var(--text-main); }

        .examples-box {
            background: #fafafa; border: 1px solid var(--border-light); border-left: 4px solid;
            padding: 1.5rem 2rem; border-radius: 0 12px 12px 0; margin-bottom: 3rem;
        }
        .examples-title { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; color: var(--text-muted); }
        .example-sentence { font-family: 'Fraunces', serif; font-size: 1.15rem; margin-bottom: 0.85rem; color: var(--text-main); line-height: 1.5; }
        .example-sentence:last-child { margin-bottom: 0; }
        .highlight { font-weight: 800; text-decoration: underline; text-underline-offset: 4px; text-decoration-thickness: 2px; }

        /* Grids */
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
        .info-card {
            background: var(--bg-surface); border: 1px solid var(--border-light);
            padding: 1.75rem; border-radius: 16px; transition: var(--transition);
            display: flex; flex-direction: column;
        }
        .info-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); border-color: transparent; }
        .card-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
        .card-desc { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 1.5rem; flex-grow: 1; }
        .tag-wrap { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: auto; }
        .tag { font-size: 0.85rem; font-weight: 600; padding: 0.35rem 0.85rem; border-radius: 6px; background: var(--bg-base); border: 1px solid var(--border-light); }

        /* Rules Box */
        .rules-box { background: #111827; color: #f9fafb; padding: 3rem; border-radius: 16px; position: relative; overflow: hidden; margin-bottom: 2rem;}
        .rules-box::after {
            content: ''; position: absolute; top: 0; right: 0; width: 250px; height: 250px;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%); border-radius: 50%; transform: translate(30%, -30%);
        }
        .rules-title { font-family: 'Fraunces', serif; font-size: 1.75rem; margin-bottom: 1.5rem; color: #fcd34d; }
        .rules-list { list-style: none; }
        .rules-list li { position: relative; padding-left: 1.75rem; margin-bottom: 1.25rem; font-size: 1rem; line-height: 1.6; color: #e5e7eb; }
        .rules-list li::before { content: '→'; position: absolute; left: 0; color: #fcd34d; font-weight: bold; font-size: 1.2rem; top: -2px;}
        .rules-list li strong { color: #ffffff; }

        /* Tables & Structure */
        .table-container { overflow-x: auto; background: var(--bg-surface); border-radius: 16px; border: 1px solid var(--border-light); box-shadow: var(--shadow-sm); margin-bottom: 3rem; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #f8fafc; padding: 1.25rem 1.5rem; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); border-bottom: 2px solid var(--border-light); }
        td { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border-light); font-size: 1rem; vertical-align: top; }
        tr:last-child td { border-bottom: none; } tr:hover td { background: #f8fafc; }
        .formula-tag { font-family: monospace; background: #e2e8f0; padding: 0.35rem 0.65rem; border-radius: 6px; color: #334155; font-weight: 600; font-size: 0.9rem; display: inline-block; margin-bottom: 0.5rem;}
        .sub-text { font-size: 0.85rem; color: var(--text-muted); display: block; margin-top: 0.25rem;}

        /* Accordions */
        .accordion { background: var(--bg-surface); border: 1px solid var(--border-light); border-radius: 12px; margin-bottom: 1rem; overflow: hidden; transition: var(--transition); }
        .accordion-header { padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-family: 'Fraunces', serif; font-weight: 600; font-size: 1.35rem; user-select: none; background: var(--bg-surface); }
        .accordion-header:hover { background: var(--bg-base); }
        .accordion-icon { transition: transform 0.3s ease; }
        .accordion.open .accordion-icon { transform: rotate(180deg); }
        .accordion-content { padding: 0 2rem; max-height: 0; overflow: hidden; transition: max-height 0.4s ease, padding 0.4s ease; background: #fafafa; }
        .accordion.open .accordion-content { padding: 0 2rem 2rem; max-height: 3000px; border-top: 1px solid var(--border-light); }

        .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1.5rem; }
        @media(max-width: 768px) { .compare-grid { grid-template-columns: 1fr; } }
        .compare-box { padding: 1.5rem; border-radius: 12px; font-size: 1rem; line-height: 1.5;}
        .compare-wrong { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
        .compare-right { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
        .compare-label { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; margin-bottom: 0.75rem; letter-spacing: 0.05em; }

        .builder-wrap { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 1rem; background: var(--bg-surface); padding: 3rem 2rem; border-radius: 16px; border: 1px solid var(--border-light); margin-bottom: 3rem; }
        .b-block { text-align: center; }
        .b-word { font-family: 'Fraunces', serif; font-size: 1.75rem; font-weight: 600; padding: 1rem 2rem; border-radius: 12px; margin-bottom: 0.75rem; box-shadow: var(--shadow-sm); }
        .b-label { font-size: 0.8rem; text-transform: uppercase; font-weight: 700; color: var(--text-muted); letter-spacing: 0.05em; }
        .b-plus { font-size: 2rem; color: var(--border-light); font-weight: 300; margin-bottom: 2rem; padding: 0 0.5rem;}

        .section-divider { text-align: center; margin: 6rem 0; position: relative; }
        .section-divider::after { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border-light); z-index: -1; }
        .section-divider span { background: var(--bg-base); padding: 0 2rem; font-family: 'Fraunces', serif; font-style: italic; font-size: 1.5rem; color: var(--text-muted); font-weight: 600;}

        footer { text-align: center; padding: 4rem 2rem; background: var(--text-main); color: white; font-size: 1rem; }
        .quick-index { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.75rem; max-width: 900px; margin: 0 auto; }
        .qi-pill { text-decoration: none; padding: 0.6rem 1.25rem; border-radius: 999px; font-size: 0.95rem; font-weight: 600; transition: var(--transition); border: 1px solid transparent; }
        .qi-pill:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    </style>
</head>

            // 2. Conditionals Blocks
            const condBlocksHtml = adv.conditionals.blocks.map(block => `
                <div class="info-card" style="border-top: 4px solid ${block.color}">
                    <div class="card-title" style="color:${block.color}">${block.word} Conditional</div>
                    <div class="card-desc" style="font-weight: 600; color:var(--text-main)">${block.label}</div>
                    <span class="formula-tag" style="background:${block.bg}; color:${block.color}">${block.desc}</span>
                    <div class="example-sentence" style="margin-top:1rem; font-size:1rem;">"${block.ex}"</div>
                </div>
            `).join('');

            const condHtml = `
                <section id="conditionals" class="animate-on-scroll">
                    <div class="pos-header">
                        <div class="pos-number" style="background:${adv.conditionals.bg}; color:${adv.conditionals.color};">11</div>
                        <div class="pos-title-wrap">
                            <h2 style="color:${adv.conditionals.color}">${adv.conditionals.title}</h2>
                            <div class="pos-subtitle">${adv.conditionals.subtitle}</div>
                        </div>
                    </div>
                    <div class="grid-cards" style="grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));">
                        ${condBlocksHtml}
                    </div>
                    <div class="rules-box">
                        <div class="rules-title">${adv.conditionals.rulesTitle}</div>
                        <p style="margin-bottom: 1.5rem; color:#d1d5db; font-size: 1.1rem;">${adv.conditionals.rulesDesc}</p>
                        <ul class="rules-list">${adv.conditionals.rules.map(r => `<li>${r}</li>`).join('')}</ul>
                    </div>
                </section>
            `;

            // 3. Voices Blocks
             const voiceBlocksHtml = adv.voices.blocks.map(block => `
                <div class="info-card" style="border-top: 4px solid ${block.color}">
                    <div class="card-title" style="color:${block.color}; font-size: 1.5rem;">${block.word} Voice</div>
                    <span class="formula-tag" style="background:${block.bg}; color:${block.color}">${block.label}</span>
                    <div class="card-desc" style="margin-top: 0.5rem">${block.desc}</div>
                    <div class="example-sentence" style="margin-top:auto; font-size:1.1rem; padding-top:1rem; border-top:1px solid var(--border-light)">"${block.ex}"</div>
                </div>
            `).join('');

            const voiceHtml = `
                <section id="voices" class="animate-on-scroll">
                    <div class="pos-header">
                        <div class="pos-number" style="background:${adv.voices.bg}; color:${adv.voices.color};">12</div>
                        <div class="pos-title-wrap">
                            <h2 style="color:${adv.voices.color}">${adv.voices.title}</h2>
                            <div class="pos-subtitle">${adv.voices.subtitle}</div>
                        </div>
                    </div>
                    <div class="grid-cards" style="grid-template-columns: 1fr 1fr;">
                        ${voiceBlocksHtml}
                    </div>
                    <div class="rules-box">
                        <div class="rules-title">${adv.voices.rulesTitle}</div>
                        <p style="margin-bottom: 1.5rem; color:#d1d5db; font-size: 1.1rem;">${adv.voices.rulesDesc}</p>
                        <ul class="rules-list">${adv.voices.rules.map(r => `<li>${r}</li>`).join('')}</ul>
                    </div>
                </section>
            `;

            // 4. Speaking Guide Accordions
            const accordionsHtml = adv.speaking.accordions.map(acc => `
                <div class="accordion">
                    <div class="accordion-header">
                        ${acc.title}
                        <svg class="accordion-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </div>
                    <div class="accordion-content">${acc.content}</div>
                </div>
            `).join('');

            const speakingHtml = `
                <div class="section-divider"><span>Practical Application</span></div>
                <section id="speaking" class="animate-on-scroll">
                    <div class="pos-header">
                        <div class="pos-number" style="background:${adv.speaking.bg}; color:${adv.speaking.color};">13</div>
                        <div class="pos-title-wrap">
                            <h2 style="color:${adv.speaking.color}">${adv.speaking.title}</h2>
                            <div class="pos-subtitle">${adv.speaking.subtitle}</div>
                        </div>
                    </div>
                    ${accordionsHtml}
                </section>
            `;

            return tensesHtml + condHtml + voiceHtml + speakingHtml;
        }

        // =====================================================================
        // 3. INITIALIZATION & EVENT LISTENERS
        // =====================================================================

        function initApp() {
            renderNav();
            renderHero();
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = renderPartsOfSpeech() + renderAdvancedSections();
            
            attachEventListeners();
        }

        function attachEventListeners() {
            // Progress Bar
            window.addEventListener('scroll', () => {
                const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
                const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                document.getElementById("progress-bar").style.width = ((winScroll / height) * 100) + "%";
            });

            // Intersection Observer (Scroll Animations)
            const observer = new IntersectionObserver((entries, obs) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        obs.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 }); // Trigger a bit earlier for smoother flow

            document.querySelectorAll('.animate-on-scroll').forEach(section => observer.observe(section));

            // Accordions Logic
            document.querySelectorAll('.accordion-header').forEach(header => {
                header.addEventListener('click', () => {
                    const accordion = header.parentElement;
                    document.querySelectorAll('.accordion').forEach(acc => {
                        if (acc !== accordion) acc.classList.remove('open');
                    });
                    accordion.classList.toggle('open');
                });
            });

            // Open first accordion by default
            setTimeout(() => {
                const firstAcc = document.querySelector('.accordion');
                if(firstAcc) firstAcc.classList.add('open');
            }, 600);

            // Active Nav Links
            const sections = document.querySelectorAll("section");
            const navLinks = document.querySelectorAll(".nav-link");

            window.addEventListener("scroll", () => {
                let current = "";
                sections.forEach(section => {
                    if (pageYOffset >= section.offsetTop - 180) {
                        current = section.getAttribute("id");
                    }
                });

                navLinks.forEach(link => {
                    link.classList.remove("active");
                    if (link.getAttribute("href").includes(current) && current !== "") {
                        link.classList.add("active");
                        link.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
                    }
                });
            });
        }

        // Boot up the framework
        initApp();

    </script>
</body>
</html>
